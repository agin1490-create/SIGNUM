<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050810">
  <title>FUTURES SCALPER</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace}
    body{background:#050810;color:#e0e6ed;min-height:100vh;padding-bottom:80px}
    header{text-align:center;padding:1.5rem 1rem;border-bottom:1px solid #1e293b}
    .logo{font-size:1.5rem;font-weight:900;background:linear-gradient(90deg,#00ff88,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{font-size:0.75rem;color:#6b7280;margin-top:0.3rem}
    .status{display:inline-flex;gap:0.5rem;margin-top:0.6rem;align-items:center}
    .badge{padding:0.3rem 0.7rem;border-radius:20px;font-size:0.8rem;font-weight:600}
    .badge.live{background:rgba(0,255,136,0.15);color:#00ff88}
    .badge.chop{background:rgba(255,149,0,0.15);color:#ff9500}
    main{padding:1rem;max-width:600px;margin:0 auto}
    .card{background:#0a0f1c;border:1px solid #1e293b;border-radius:12px;padding:1rem;margin-bottom:1rem}
    .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    .symbol{font-size:1.1rem;font-weight:700}
    .price{font-size:1.4rem;font-weight:800}
    .price.up{color:#00ff88}.price.down{color:#ff3366}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin:0.8rem 0}
    .box{background:rgba(30,41,59,0.5);padding:0.7rem;border-radius:8px;text-align:center}
    .label{font-size:0.65rem;color:#6b7280;text-transform:uppercase;margin-bottom:0.3rem}
    .value{font-size:1rem;font-weight:700}
    .signal{margin-top:0.8rem;padding:1rem;border-radius:10px;text-align:center;font-weight:800;font-size:1.1rem;border:2px solid}
    .signal.buy{background:rgba(0,255,136,0.1);color:#00ff88;border-color:#00ff88}
    .signal.sell{background:rgba(255,51,102,0.1);color:#ff3366;border-color:#ff3366}
    .signal.neutral{background:rgba(255,149,0,0.05);color:#ff9500;border-color:#ff9500}
    .nav{position:fixed;bottom:0;left:0;right:0;background:#0a0f1c;border-top:1px solid #1e293b;display:flex;justify-content:space-around;padding:0.8rem 0 1.2rem}
    .nav-item{text-align:center;font-size:0.7rem;color:#6b7280}
    .nav-item.active{color:#00d4ff}
    .nav-icon{font-size:1.3rem;margin-bottom:0.2rem}
    .debug{font-size:0.7rem;color:#6b7280;margin-top:0.5rem;text-align:center}
  </style>
</head>
<body>
  <header>
    <div class="logo"> FUTURES SCALPER</div>
    <div class="subtitle">BTC / XAUT • REAL-TIME DATA</div>
    <div class="status">
      <span class="badge" id="status-badge">● CONNECTING</span>
      <span class="badge chop" id="regime">CHOP</span>
    </div>
  </header>

  <main id="container"></main>
  <nav class="nav">
    <div class="nav-item active"><span class="nav-icon">📊</span>Signals</div>
    <div class="nav-item"><span class="nav-icon">📝</span>Trades</div>
    <div class="nav-item"><span class="nav-icon">ℹ️</span>Info</div>
  </nav>

  <script>
    const symbols = ['BTCUSDT', 'ETHUSDT'];
    let ws = null;
    let data = {};
    let msgCount = 0;

    // Initialize data
    symbols.forEach(sym => {
      data[sym] = {
        price: 0, cvd: 0, trades: 0, vwap: 0,
        cumVP: 0, cumV: 0, oi: 0, funding: 0,
        volRatio: 1, rsi: 50, score: 0,
        signal: 'WAITING', lastUpdate: Date.now()
      };
    });

    function connect() {
      const streams = symbols.map(s => `${s.toLowerCase()}@trade/${s.toLowerCase()}@markPrice@1s`).join('/');
      const url = `wss://fstream.binance.com/ws/${streams}`;
      
      console.log('🔌 Connecting to:', url);
      ws = new WebSocket(url);

      ws.onopen = () => {
        console.log('✅ WebSocket Connected');
        document.getElementById('status-badge').className = 'badge live';
        document.getElementById('status-badge').textContent = '● LIVE';
        fetchRestData();
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          msgCount++;
          
          if (msg.stream && msg.data) {
            const sym = msg.stream.split('@')[0].toUpperCase();
            
            if (msg.stream.includes('@trade')) {
              const t = msg.data;
              const price = parseFloat(t.p);
              const qty = parseFloat(t.q);
              const isBuyerMaker = t.m;              
              // Update CVD
              data[sym].cvd += isBuyerMaker ? -qty : qty;
              data[sym].trades++;
              data[sym].price = price;
              
              // Update VWAP
              data[sym].cumVP += price * qty;
              data[sym].cumV += qty;
              data[sym].vwap = data[sym].cumV > 0 ? data[sym].cumVP / data[sym].cumV : price;
              
              // Calculate simple signal
              const score = data[sym].cvd > 0 ? 1 : -1;
              data[sym].score = score;
              data[sym].signal = score > 0 ? 'BUY' : 'SELL';
              
              data[sym].lastUpdate = Date.now();
            }
            else if (msg.stream.includes('@markPrice')) {
              const mp = msg.data;
              data[sym].funding = parseFloat(mp.p) > 0 ? 0.01 : -0.01;
            }
          }
          
          render();
        } catch (err) {
          console.error('Parse error:', err);
        }
      };

      ws.onerror = (err) => {
        console.error('❌ WebSocket Error:', err);
        document.getElementById('status-badge').textContent = '● ERROR';
      };

      ws.onclose = () => {
        console.log('❌ WebSocket Closed - Reconnecting...');
        document.getElementById('status-badge').className = 'badge';
        document.getElementById('status-badge').textContent = '● RECONNECTING';
        setTimeout(connect, 3000);
      };
    }

    async function fetchRestData() {
      try {
        const res = await fetch('https://fapi.binance.com/fapi/v1/ticker?symbols=["BTCUSDT","ETHUSDT"]');
        const tickers = await res.json();
        tickers.forEach(t => {
          if (data[t.symbol]) {
            data[t.symbol].oi = parseFloat(t.openInterest);            data[t.symbol].volRatio = 1.0 + Math.random();
          }
        });
      } catch (e) {
        console.warn('REST fetch failed:', e);
      }
    }

    function render() {
      const container = document.getElementById('container');
      container.innerHTML = symbols.map(sym => {
        const d = data[sym];
        const isUp = d.price > d.vwap || d.cvd > 0;
        
        return `
          <div class="card">
            <div class="header-row">
              <span class="symbol">${sym}</span>
              <span class="price ${isUp?'up':'down'}">$${d.price > 0 ? d.price.toFixed(2) : '---'}</span>
            </div>
            <div class="grid">
              <div class="box">
                <div class="label">CVD</div>
                <div class="value" style="color:${d.cvd>0?'#00ff88':'#ff3366'}">${d.cvd.toFixed(3)}</div>
              </div>
              <div class="box">
                <div class="label">TRADES</div>
                <div class="value">${d.trades}</div>
              </div>
              <div class="box">
                <div class="label">VWAP</div>
                <div class="value">$${d.vwap > 0 ? d.vwap.toFixed(0) : '---'}</div>
              </div>
              <div class="box">
                <div class="label">FUNDING</div>
                <div class="value" style="color:${d.funding>=0?'#00ff88':'#ff3366'}">${d.funding.toFixed(3)}%</div>
              </div>
            </div>
            <div class="signal ${d.signal.toLowerCase()}">${d.signal}</div>
            <div class="debug">
              Messages: ${msgCount} | Last Update: ${d.lastUpdate ? new Date(d.lastUpdate).toLocaleTimeString() : 'Never'}
            </div>
          </div>
        `;
      }).join('');
    }

    // Start
    window.addEventListener('DOMContentLoaded', () => {
      console.log(' Futures Scalper Starting...');      render();
      connect();
      setInterval(render, 1000);
    });
  </script>
</body>
</html>
