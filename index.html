<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050810">
  <title>CVD SCALPER PRO</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,monospace}
    body{background:#050810;color:#e0e6ed;min-height:100vh;padding:1rem;padding-bottom:90px}
    .header{text-align:center;padding:1.5rem 0;border-bottom:1px solid #1e293b;margin-bottom:1rem}
    .logo{font-size:1.6rem;font-weight:900;background:linear-gradient(90deg,#00ff88,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{font-size:0.75rem;color:#6b7280;margin-top:0.3rem}
    .status{margin-top:0.5rem;padding:0.3rem 0.8rem;border-radius:20px;display:inline-block;font-size:0.8rem;font-weight:600}
    .status.connected{background:rgba(0,255,136,0.15);color:#00ff88}
    .status.disconnected{background:rgba(255,51,102,0.15);color:#ff3366}
    .counter{font-size:0.75rem;color:#6b7280;margin-top:0.5rem}
    .card{background:#0a0f1c;border:1px solid #1e293b;border-radius:12px;padding:1rem;margin-bottom:1rem}
    .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem}
    .name{font-size:1.1rem;font-weight:700}
    .price{font-size:1.3rem;font-weight:800}
    .price.up{color:#00ff88}.price.down{color:#ff3366}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin:0.8rem 0}
    .box{background:rgba(30,41,59,0.5);padding:0.6rem;border-radius:8px;text-align:center}
    .label{font-size:0.65rem;color:#6b7280;text-transform:uppercase;margin-bottom:0.2rem}
    .value{font-size:0.95rem;font-weight:700}
    .signal{margin-top:0.8rem;padding:0.9rem;border-radius:10px;text-align:center;font-weight:800;font-size:1rem;border:2px solid}
    .signal.buy{background:rgba(0,255,136,0.1);color:#00ff88;border-color:#00ff88}
    .signal.sell{background:rgba(255,51,102,0.1);color:#ff3366;border-color:#ff3366}
    .signal.neutral{background:rgba(255,149,0,0.05);color:#ff9500;border-color:#ff9500}
    .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,28,0.98);backdrop-filter:blur(10px);border-top:1px solid #1e293b;display:flex;justify-content:space-around;padding:0.7rem 0 calc(0.7rem + env(safe-area-inset-bottom));z-index:100}
    .nav-item{text-align:center;font-size:0.7rem;color:#6b7280;cursor:pointer}
    .nav-item.active{color:#00d4ff}
    .nav-icon{font-size:1.2rem;margin-bottom:0.1rem}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡ CVD SCALPER PRO</div>
    <div class="subtitle">Real-Time Trade Flow Analysis</div>
    <div class="status disconnected" id="status">Connecting...</div>
    <div class="counter" id="msg-counter">Messages: 0</div>
  </div>

  <div id="cards"></div>

  <div class="nav">
    <div class="nav-item active"><div class="nav-icon">📊</div>Signals</div>
    <div class="nav-item"><div class="nav-icon">📝</div>Trades</div>    <div class="nav-item"><div class="nav-icon">📈</div>Stats</div>
  </div>

  <script>
    const CONFIG = {
      symbols: ['BTCUSDT', 'ETHUSDT'],
      wsUrl: 'wss://stream.binance.com:9443/stream?streams=btcusdt@trade/ethusdt@trade'
    };

    let ws = null;
    let msgCount = 0;
    let data = {
      'BTCUSDT': { price: 0, cvd: 0, trades: 0, vwap: 0, cumVP: 0, cumV: 0, score: 0, signal: 'NEUTRAL' },
      'ETHUSDT': { price: 0, cvd: 0, trades: 0, vwap: 0, cumVP: 0, cumV: 0, score: 0, signal: 'NEUTRAL' }
    };

    function connect() {
      const status = document.getElementById('status');
      status.textContent = 'Connecting...';
      
      console.log('Connecting to:', CONFIG.wsUrl);
      ws = new WebSocket(CONFIG.wsUrl);

      ws.onopen = () => {
        console.log('WebSocket Connected');
        status.textContent = '● LIVE';
        status.className = 'status connected';
        fetchPrices();
      };

      ws.onmessage = (event) => {
        try {
          const raw = JSON.parse(event.data);
          console.log('Raw Message:', raw); // Debug log
          
          // Binance combined stream format: { stream: "btcusdt@trade", data: { ... } }
          if (raw.stream && raw.data) {
            handleTrade(raw.data);
          } 
          // Direct stream format (fallback)
          else if (raw.e === 'trade') {
            handleTrade(raw);
          }
        } catch (e) {
          console.error('Parse error:', e);
        }
      };

      ws.onerror = (err) => {
        console.error('WS Error:', err);        status.textContent = '● ERROR';
        status.className = 'status disconnected';
      };

      ws.onclose = () => {
        status.textContent = '● RECONNECTING...';
        status.className = 'status disconnected';
        setTimeout(connect, 3000);
      };
    }

    function handleTrade(t) {
      const symbol = t.s; // e.g., "BTCUSDT"
      if (!data[symbol]) return;

      const price = parseFloat(t.p);
      const qty = parseFloat(t.q);
      const isBuyerMaker = t.m; // true = seller initiated, false = buyer initiated

      // Update Data
      data[symbol].price = price;
      data[symbol].trades++;
      msgCount++;
      
      // CVD: If buyer is maker (t.m=true), it's a sell order hitting the book -> Negative CVD
      // If buyer is NOT maker (t.m=false), it's a buy order hitting the book -> Positive CVD
      data[symbol].cvd += isBuyerMaker ? -qty : qty;
      
      // VWAP
      data[symbol].cumVP += price * qty;
      data[symbol].cumV += qty;
      data[symbol].vwap = data[symbol].cumV > 0 ? data[symbol].cumVP / data[symbol].cumV : price;

      // Simple Signal Logic
      const score = (data[symbol].cvd > 0 ? 1 : -1) + (price > data[symbol].vwap ? 1 : -1);
      data[symbol].score = score;
      data[symbol].signal = score >= 2 ? 'BUY' : score <= -2 ? 'SELL' : 'NEUTRAL';

      // Update UI
      document.getElementById('msg-counter').textContent = `Messages: ${msgCount}`;
      render();
    }

    async function fetchPrices() {
      try {
        const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","ETHUSDT"]');
        const prices = await res.json();
        prices.forEach(p => {
          if (data[p.symbol]) data[p.symbol].price = parseFloat(p.price);
        });        render();
      } catch (e) { console.error(e); }
    }

    function render() {
      const container = document.getElementById('cards');
      container.innerHTML = Object.entries(data).map(([sym, d]) => `
        <div class="card">
          <div class="row">
            <div class="name">${sym}</div>
            <div class="price ${d.price > d.vwap ? 'up' : 'down'}">$${d.price.toFixed(2)}</div>
          </div>
          <div class="grid">
            <div class="box"><div class="label">CVD</div><div class="value">${d.cvd.toFixed(2)}</div></div>
            <div class="box"><div class="label">VWAP</div><div class="value">$${d.vwap.toFixed(0)}</div></div>
            <div class="box"><div class="label">Trades</div><div class="value">${d.trades}</div></div>
            <div class="box"><div class="label">Score</div><div class="value">${d.score.toFixed(0)}</div></div>
          </div>
          <div class="signal ${d.signal.toLowerCase()}">${d.signal}</div>
        </div>
      `).join('');
    }

    window.addEventListener('DOMContentLoaded', () => {
      render();
      connect();
    });
  </script>
</body>
</html>
